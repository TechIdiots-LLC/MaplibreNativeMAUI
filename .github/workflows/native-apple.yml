name: Native Apple (Metal)

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS arm64
            cmake-system: iOS
            cmake-sysroot: iphoneos
            cmake-archs: arm64
            extra-flags: ""
            artifact: native-ios-arm64

          - name: iOS Simulator arm64
            cmake-system: iOS
            cmake-sysroot: iphonesimulator
            cmake-archs: arm64
            extra-flags: ""
            artifact: native-iossimulator-arm64

          - name: macCatalyst arm64+x64
            cmake-system: Darwin
            cmake-sysroot: macosx
            cmake-archs: "x86_64;arm64"
            extra-flags: -DCMAKE_XCODE_ATTRIBUTE_SUPPORTS_MACCATALYST=YES -DCMAKE_XCODE_ATTRIBUTE_IPHONEOS_DEPLOYMENT_TARGET=15.0 -DMLN_WITH_GLFW=OFF
            artifact: native-maccatalyst

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch darwin.cmake for macCatalyst
        if: ${{ matrix.artifact == 'native-maccatalyst' }}
        run: |
          # ios.cmake (only included when CMAKE_SYSTEM_NAME=iOS) links
          # mbgl-vendor-filesystem to mbgl-core, which provides the include
          # path for <ghc/filesystem.hpp> used by action_journal_impl.cpp.
          # Darwin builds omit ios.cmake, so add the link manually.
          echo 'target_link_libraries(mbgl-core PRIVATE mbgl-vendor-filesystem)' \
            >> dependencies/maplibre-native/platform/darwin/darwin.cmake

      - name: Configure CMake
        run: |
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=${{ matrix.cmake-system }} \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.cmake-archs }}" \
            -DCMAKE_OSX_SYSROOT=${{ matrix.cmake-sysroot }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            ${{ matrix.extra-flags }} \
            -DMLN_WITH_METAL=ON

      - name: Build mln-cabi
        run: |
          if [ "${{ matrix.artifact }}" = "native-maccatalyst" ]; then
            # cmake --build injects -sdk macosx (from CMAKE_OSX_SYSROOT) into
            # the xcodebuild invocation. Xcode rejects combining -sdk with
            # -destination, silently falling back to a plain macOS build and
            # producing macOS-tagged objects instead of MACCATALYST ones.
            # Bypass cmake and call xcodebuild directly so we control every flag:
            # -destination "platform=macOS,variant=Mac Catalyst" sets
            # IS_MACCATALYST=YES, uses the macabi target triple, and prepends
            # the iOSSupport framework path (MetalKit resolves to UIKit-based
            # MTKView instead of the AppKit NSView subclass).
            XCODEPROJ=$(find build -maxdepth 2 -name "*.xcodeproj" | head -1)
            echo "Building for Mac Catalyst: $XCODEPROJ"
            xcodebuild \
              -project "$XCODEPROJ" \
              -target mln-cabi \
              -configuration Release \
              -destination "platform=macOS,variant=Mac Catalyst" \
              ONLY_ACTIVE_ARCH=NO \
              build
          else
            cmake --build build --target mln-cabi --config Release
          fi

      - name: Merge into self-contained archive
        run: |
          # libmln-cabi.a is a thin C wrapper whose PRIVATE cmake link deps
          # (mbgl-core, metal-cpp symbols, vendor libs) are NOT merged into
          # it by the static archiver.  The Xcode generator puts every library
          # for the same configuration into identically-named subdirectories
          # (e.g. Release-iphoneos, Release-iphonesimulator, Release-maccatalyst).
          # Collect all of them and merge with libtool so the resulting archive
          # is self-contained and can be distributed as an XCFramework slice.
          CABI=$(find build -name "libmln-cabi.a" | head -1)
          echo "Target archive: $CABI"
          ALL_LIBS=$(find build -name "*.a" -type f | sort)
          echo "Libraries to merge:"
          echo "$ALL_LIBS"
          # shellcheck disable=SC2086
          libtool -static -o "${CABI}.merged" ${ALL_LIBS}
          mv "${CABI}.merged" "$CABI"
          echo "Merged object count: $(ar -t "$CABI" | wc -l)"

      - name: Locate built library
        id: find-lib
        run: |
          LIB=$(find build -name "libmln-cabi.a" | head -1)
          echo "path=$LIB" >> "$GITHUB_OUTPUT"
          echo "Found: $LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.find-lib.outputs.path }}
          retention-days: 7
